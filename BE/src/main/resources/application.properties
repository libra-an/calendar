#BACKEND INFORMATION
spring.application.name=BE
server.port=${SERVER_PORT:2005}

#Ket noi co so du lieu
spring.datasource.url=jdbc:mysql://localhost:3306/smart_calendar_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:An123456789}

#Cau hinh JPA va Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
